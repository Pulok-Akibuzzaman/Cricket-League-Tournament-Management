- # ====== Region: Teams With More Wins Than Losses ============
  id: 121278956550315765816
  identification: 
    name: Teams With More Wins Than Losses
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          t.team_name,
          r.wins,
          r.losses
      FROM team t
      JOIN ranking r ON t.team_id = r.team_id
      WHERE r.wins > r.losses
      ORDER BY r.wins DESC

  order-by: 
    type: None

