- # ====== Region: Find the top 3 venues that hosted the most ma
  id: 121277553973196035100
  identification: 
    name: Find the top 3 venues that hosted the most matches, sorted by match count
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT v.stadium_name,
             COUNT(m.match_id) AS total_matches
      FROM venue v
      NATURAL JOIN match m
      GROUP BY v.stadium_name
      ORDER BY total_matches DESC
      FETCH FIRST 3 ROWS ONLY

  order-by: 
    type: None

