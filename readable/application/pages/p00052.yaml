- # ====== Region: Tournaments That Have Matches Scheduled but N
  id: 121277470738367731227
  identification: 
    name: Tournaments That Have Matches Scheduled but Not Completed
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT DISTINCT
          t.name AS tournament_name
      FROM tournament t
      JOIN match m ON t.tournament_id = m.tournament_id
      WHERE m.match_id IN
            (SELECT match_id
             FROM schedule
             WHERE status != 'Completed')

  order-by: 
    type: None

