- # ====== Region: Ticket Types That Are Sold More Than the Aver
  id: 121279342720984091030
  identification: 
    name: Ticket Types That Are Sold More Than the Average Ticket Sales
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          t.ticket_type,
          COUNT(a.audience_id) AS total_sold
      FROM ticket t
      JOIN audience a ON t.ticket_id = a.ticket_id
      GROUP BY t.ticket_type
      HAVING COUNT(a.audience_id) >
            (SELECT AVG(cnt)
             FROM (
                   SELECT COUNT(audience_id) AS cnt
                   FROM audience
                   GROUP BY ticket_id
                  ))
      ORDER BY total_sold DESC

  order-by: 
    type: None

