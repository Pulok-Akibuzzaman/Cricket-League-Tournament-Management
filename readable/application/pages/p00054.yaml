- # ====== Region: Cities That Have More Than One Registered Per
  id: 121278330839106053016
  identification: 
    name: Cities That Have More Than One Registered Person
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          city,
          COUNT(person_id) AS total_people
      FROM person
      WHERE city IS NOT NULL
      GROUP BY city
      HAVING COUNT(person_id) > 1
      ORDER BY total_people DESC

  order-by: 
    type: None

