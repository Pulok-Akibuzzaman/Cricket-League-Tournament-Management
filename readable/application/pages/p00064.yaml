- # ====== Region: Tournament with the highest number of partici
  id: 121280069111626117255
  identification: 
    name: Tournament with the highest number of participating teams
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT tournament_id,
             COUNT(team_id) AS team_count
      FROM participates
      GROUP BY tournament_id
      HAVING COUNT(team_id) =
            (SELECT MAX(team_total)
             FROM (SELECT COUNT(team_id) AS team_total
                   FROM participates
                   GROUP BY tournament_id))

