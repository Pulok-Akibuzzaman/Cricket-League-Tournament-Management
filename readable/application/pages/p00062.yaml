- # ====== Region: List of Coaches Whose Name Starts with ‘A’ an
  id: 121279750943400786085
  identification: 
    name: List of Coaches Whose Name Starts with ‘A’ and Salary Above Average
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          p.name,
          c.salary,
          t.team_name
      FROM coach c
      JOIN person p ON c.person_id = p.person_id
      JOIN team t ON c.team_id = t.team_id
      WHERE p.name LIKE 'A%'
      AND c.salary >
          (SELECT AVG(salary) FROM coach)
      ORDER BY c.salary DESC

  order-by: 
    type: None

