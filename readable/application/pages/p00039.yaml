    - # ====== Series: Stadium Name ================================
      id: 121219811382248650802
      identification: 
        name: Stadium Name

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          SELECT v.stadium_name,
                 COUNT(m.match_id) AS total_matches
          FROM venue v
          NATURAL JOIN match m
          GROUP BY v.stadium_name
          ORDER BY total_matches DESC
          FETCH FIRST 3 ROWS ONLY;
          

