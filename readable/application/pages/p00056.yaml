- # ====== Region: Players Whose Contract Salary Is the Maximum 
  id: 121278426704134066803
  identification: 
    name: Players Whose Contract Salary Is the Maximum in Their Team
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT
          p.player_id,
          pc.salary,
          p.team_id
      FROM player p
      JOIN player_contract pc
        ON p.player_id = pc.player_id
      WHERE pc.salary =
            (SELECT MAX(pc2.salary)
             FROM player_contract pc2
             JOIN player p2
               ON pc2.player_id = p2.player_id
             WHERE p2.team_id = p.team_id)

  order-by: 
    type: None

  layout: 
