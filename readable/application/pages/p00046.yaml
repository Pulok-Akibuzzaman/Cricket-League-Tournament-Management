- # ====== Region: Teams Participating in Tournaments with High 
  id: 121274329772891006361
  identification: 
    name: Teams Participating in Tournaments with High Audience Turnout
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT DISTINCT team_name
      FROM team
      NATURAL JOIN participates
      WHERE tournament_id IN (
            SELECT tournament_id
            FROM match
            NATURAL JOIN attends
            GROUP BY tournament_id
            HAVING COUNT(audience_id) >
                  (SELECT AVG(audience_count)
                   FROM (
                         SELECT COUNT(audience_id) AS audience_count
                         FROM attends
                         GROUP BY match_id
                        ))
      )
      ORDER BY team_name

  order-by: 
    type: None

