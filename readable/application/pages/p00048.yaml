- # ====== Region: Get the average ticket price for each type of
  id: 121275732683189704096
  identification: 
    name: Get the average ticket price for each type of ticket (REGULAR, VIP, etc.) and the total number of tickets sold
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT ticket_type,
             ROUND(AVG(price), 2) AS average_price,
             COUNT(ticket_id) AS total_tickets_sold
      FROM ticket
      GROUP BY ticket_type
      ORDER BY total_tickets_sold DESC

  order-by: 
    type: None

